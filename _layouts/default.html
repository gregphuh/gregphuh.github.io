<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.description }}{% endif %}</title>

<link rel="icon" type="image/png" href="/assets/icon.png" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Light page surface — clean white background, dark text. Brand
       accent colors are kept the same so links + buttons still pop. */
    --bg: #ffffff;
    --surface: #f7f5f2;     /* warm-tinted near-white for cards */
    --border: #e7e5e4;      /* hairline gray for dividers */
    --burnt: #c2410c;       /* brand burnt orange */
    --yellow: #eab308;      /* brand warm yellow */
    --text: #1c1917;        /* near-black, warm-tinted */
    --muted: #57534e;       /* slate gray for secondary text */

    /* Header keeps the original dark warm aesthetic so the brand wordmark
       still has its glow + the gradient logo reads correctly. Exposed as
       its own vars so the .site-header rules below don't need to hardcode. */
    --header-bg: #292524;
    --header-border: #57534e;
    --header-text: #f5f5f4;
    --header-muted: #a8a29e;

    /* Aliases used by sections that were originally drafted with these
       names — keeps the rest of the stylesheet working without renames. */
    --brand-yellow: var(--yellow);
    --brand-orange: var(--burnt);
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    /* Clip horizontal overflow so the full-bleed hero banner's
       100vw width doesn't introduce a horizontal scrollbar when a
       vertical scrollbar narrows the viewport's effective width. */
    overflow-x: hidden;
  }
  a { color: var(--burnt); text-decoration: none; }
  a:hover { text-decoration: underline; }
  h1, h2, h3, h4 {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.2;
    color: var(--text);
  }
  h1 { font-size: 36px; margin-bottom: 16px; }
  h2 { font-size: 24px; margin-top: 36px; margin-bottom: 12px; }
  h3 { font-size: 18px; margin-top: 24px; margin-bottom: 8px; }
  p, ul, ol { margin-bottom: 14px; }
  ul, ol { padding-left: 24px; }
  li { margin-bottom: 4px; }
  code { background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  pre { background: var(--surface); padding: 12px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  pre code { background: transparent; padding: 0; }
  strong { color: var(--text); }

  /* Header — kept dark + warm-aesthetic regardless of body theme. */
  .site-header {
    border-bottom: 1px solid var(--header-border);
    padding: 18px 0;
    position: sticky;
    top: 0;
    background: rgba(41, 37, 36, 0.96);
    backdrop-filter: blur(12px);
    z-index: 100;
    color: var(--header-text);
  }
  .site-header .inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .site-header .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.025em;
    background: linear-gradient(135deg, var(--yellow), var(--burnt));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-decoration: none;
  }
  .site-header .logo img {
    width: 32px; height: 32px;
    border-radius: 7px;
  }
  .site-header nav {
    margin-left: auto;
    display: flex; gap: 22px;
  }
  .site-header nav a {
    color: var(--header-muted);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
  }
  .site-header nav a:hover { color: var(--header-text); }

  /* Main */
  main {
    max-width: 760px;
    margin: 48px auto;
    padding: 0 24px 80px;
  }
  main.wide {
    max-width: 960px;
  }

  /* Footer */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }
  .site-footer a { color: var(--muted); }
  .site-footer .links {
    margin-top: 8px;
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 64px 24px 48px;
    max-width: 760px;
    margin: 0 auto;
    position: relative;
    isolation: isolate;
  }
  .hero .icon {
    width: 110px; height: 110px;
    border-radius: 24px;
    margin: 0 auto 24px;
    box-shadow: 0 16px 50px rgba(194, 65, 12, 0.4);
    position: relative;
    z-index: 2;
  }
  .hero h1 {
    font-size: 48px;
    background: linear-gradient(135deg, var(--yellow), var(--burnt));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
    position: relative;
    z-index: 2;
  }
  .hero .tagline {
    font-size: 19px;
    /* Hero band is dark-warm-brown; the global --muted slate-gray
       (intended for the white body background) reads as invisible
       on that backdrop. Use a soft near-white instead so the
       tagline stays legible without competing with the gradient
       wordmark above. */
    color: rgba(255, 255, 255, 0.88);
    margin-bottom: 32px;
    position: relative;
    z-index: 2;
  }
  .hero .badge-link,
  .hero p:not(.tagline) {
    position: relative;
    z-index: 2;
  }
  /* Same reasoning as .hero .tagline — the small "Then $2.99/mo"
     subtext sat on dark in muted gray and read as invisible. The
     inline `style` attribute on that <p> wins normally; bump
     specificity here so the cascade flips it to near-white. */
  .hero p:not(.tagline)[style*="muted"],
  .hero p:not(.tagline) {
    color: rgba(255, 255, 255, 0.75) !important;
  }

  /* Wavy-road animated banner — sits behind the hero content as
     a chrome-feeling backdrop. Pure SVG + CSS animation, no JS,
     sharp at any resolution. The dashed stroke paths simulate
     lane stripes flowing past as you drive; the slow "shine"
     gradient sweep gives the chrome / modern feel.

     Full-bleed: the parent `.hero` has max-width: 760px, but we
     want the banner to span the full viewport width as a true
     hero band. The `width: 100vw; left: 50%; transform: translateX(-50%)`
     trick breaks out of the constrained parent, anchored at the
     section's vertical extent. No border-radius / margin since
     it's edge-to-edge.

     Note on horizontal scrollbar: if the user's browser shows a
     vertical scrollbar, `100vw` includes the scrollbar's width,
     which can introduce a tiny horizontal scroll. The
     `overflow-x: hidden` on `body` (added below) clips that. */
  .hero-banner {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 100vw;
    transform: translateX(-50%);
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .hero-banner svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  /* "Shine" sweep — a thin bright vertical stripe that slowly
     traverses the banner left-to-right, simulating light catching
     a polished surface. */
  .hero-banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 0%,
      transparent 40%,
      rgba(234, 179, 8, 0.08) 49%,
      rgba(255, 255, 255, 0.10) 50%,
      rgba(234, 179, 8, 0.08) 51%,
      transparent 60%,
      transparent 100%
    );
    background-size: 220% 100%;
    background-position: 200% 0;
    animation: heroShine 9s ease-in-out infinite;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  @keyframes heroShine {
    0%   { background-position: 200% 0; }
    55%  { background-position: -100% 0; }
    100% { background-position: -100% 0; }
  }

  /* Animate the lane stripes to flow horizontally — gives the
     "watching the road pass" sensation. Three layers at different
     speeds + opacities create parallax depth. */
  .hero-lane-fast { animation: laneFlow 3s linear infinite; }
  .hero-lane-mid  { animation: laneFlow 5s linear infinite; }
  .hero-lane-slow { animation: laneFlow 8s linear infinite; }
  @keyframes laneFlow {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -200; }
  }
  /* Honor system motion preference — users who set
     prefers-reduced-motion get a static banner instead of the
     looping animations. Same visual, no movement. */
  @media (prefers-reduced-motion: reduce) {
    .hero-banner::after,
    .hero-lane-fast, .hero-lane-mid, .hero-lane-slow {
      animation: none;
    }
  }
  .badge-link {
    display: inline-block;
    background: var(--surface);
    padding: 14px 22px;
    border-radius: 12px;
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    border: 1px solid var(--border);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .badge-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(194, 65, 12, 0.2);
    text-decoration: none;
  }

  /* Feature cards */
  .features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
    margin: 48px 0;
  }
  .feature {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
  }
  .feature h3 { margin-top: 0; }

  /* Tables (in markdown content) */
  table { border-collapse: collapse; margin: 16px 0; width: 100%; }
  th, td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
  th { background: var(--surface); }

  /* Page intro for nav pages */
  .page-intro {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  /* Two-column "how-to" rows: copy on the left, phone screenshot on the right. */
  .how-row {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 36px;
    align-items: start;
    margin: 24px 0 8px;
  }
  .how-text :first-child { margin-top: 0; }
  .how-text ol, .how-text ul { padding-left: 20px; }
  .how-text li { margin-bottom: 6px; }
  .how-img {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px;
  }
  .how-img img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 14px;
  }

  /* Accordion FAQ */
  details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 8px 0;
  }
  details summary {
    cursor: pointer;
    list-style: none;
    color: var(--text);
    padding-right: 24px;
    position: relative;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::after {
    content: "＋";
    position: absolute;
    right: 0;
    top: 0;
    color: var(--muted);
    font-weight: 400;
  }
  details[open] summary::after { content: "－"; }
  details > p, details > ul, details > ol {
    margin-top: 10px;
    color: var(--muted);
  }

  /* Pricing comparison — two big cards side-by-side */
  .pricing { margin: 48px 0 32px; }
  .pricing-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -1px;
    font-size: 32px;
    margin: 0 0 8px;
    color: var(--text);
  }
  .pricing-sub {
    color: var(--muted);
    font-size: 16px;
    line-height: 1.55;
    margin: 0 0 28px;
    max-width: 720px;
  }
  .pricing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .pricing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    display: flex;
    flex-direction: column;
  }
  .pricing-card-base {
    border-color: var(--border);
  }
  .pricing-card-plus {
    border-color: var(--brand-yellow);
    background: linear-gradient(180deg, rgba(234, 179, 8, 0.06), rgba(234, 179, 8, 0.02) 60%, var(--surface));
  }
  .pricing-card-tag {
    display: inline-block;
    align-self: flex-start;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    background: rgba(120, 113, 108, 0.18);
    color: var(--muted);
    margin-bottom: 12px;
  }
  .pricing-card-tag-optional {
    background: rgba(234, 179, 8, 0.18);
    color: var(--brand-yellow);
  }
  .pricing-card-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -1px;
    font-size: 28px;
    margin: 0 0 4px;
    color: var(--text);
  }
  .plus-sigil {
    color: var(--brand-yellow);
  }
  .pricing-card-price {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 36px;
    letter-spacing: -1.2px;
    color: var(--text);
    margin: 4px 0 8px;
  }
  .pricing-card-price span {
    font-size: 15px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0;
  }
  .pricing-card-tagline {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
    margin: 0 0 18px;
  }
  .pricing-card-section {
    margin-top: 20px;
  }
  .pricing-card-section h4 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 10px;
  }
  .pricing-card-section-muted h4 {
    color: rgba(168, 162, 158, 0.7);
  }
  .pricing-card-fineprint {
    margin-top: auto;
    padding-top: 18px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
  }

  /* Checklists inside pricing cards */
  .checklist {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .checklist li {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 6px 0;
    font-size: 14.5px;
    color: var(--text);
    line-height: 1.5;
  }
  .checklist .check {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(34, 197, 94, 0.18);
    color: rgb(34, 197, 94);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    margin-top: 1px;
  }
  .checklist .check-plus {
    background: linear-gradient(135deg, var(--brand-yellow), var(--brand-orange));
    color: #1c1917;
    font-size: 14px;
  }
  .checklist .check-x {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(120, 113, 108, 0.2);
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    margin-top: 1px;
  }
  .checklist-muted li {
    color: var(--muted);
    font-size: 14px;
  }

  .badge-link-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: none;
  }

  /* Side-by-side comparison table */
  .compare-wrap {
    overflow-x: auto;
    margin: 16px 0 32px;
  }
  .compare {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .compare th, .compare td {
    border: 1px solid var(--border);
    padding: 12px 14px;
    text-align: left;
    vertical-align: top;
  }
  .compare th {
    background: var(--surface);
    font-size: 13px;
    letter-spacing: 0.4px;
  }
  .compare th.th-base { color: var(--text); }
  .compare th.th-plus { color: var(--brand-yellow); }
  .compare th .th-price {
    display: block;
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .compare td.cell-no { color: var(--muted); }

  /* Themes showcase — labeled grid making Plus value obvious */
  .themes-showcase {
    margin: 48px 0;
  }
  .themes-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -1px;
    font-size: 28px;
    margin: 0 0 8px;
    color: var(--text);
  }
  .themes-sub {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
    margin: 0 0 24px;
    max-width: 720px;
  }
  .themes-grid {
    display: grid;
    /* 4 per row on desktop (8 themes → 2 clean rows of 4), 2 per row on
       phone (8 themes → 4 rows of 2). Avoids the auto-fit "5 + 3" or
       "6 + 2" awkwardness with 8 cards at intermediate widths. */
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 720px) {
    .themes-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  .theme-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 12px 12px 0;
    margin: 0;
    overflow: hidden;
    transition: transform 0.15s ease;
    display: flex;
    flex-direction: column;
  }
  .theme-card:hover { transform: translateY(-2px); }
  .theme-card-base {
    border-color: var(--brand-orange);
    box-shadow: 0 0 0 1px rgba(194, 65, 12, 0.18);
  }
  .theme-card img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .theme-card figcaption {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 4px 4px 12px;
  }
  .theme-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
  }
  .theme-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 999px;
  }
  .theme-badge-base {
    background: rgba(194, 65, 12, 0.18);
    color: var(--brand-orange);
  }
  .theme-badge-plus {
    background: linear-gradient(135deg, var(--brand-yellow), var(--brand-orange));
    color: #1c1917;
  }

  /* Bucket separators (Included vs Plus) */
  .bucket-tag {
    display: inline-block;
    margin-left: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.4px;
    vertical-align: middle;
  }
  .bucket-tag-base {
    background: rgba(120, 113, 108, 0.18);
    color: var(--muted);
  }
  .bucket-blurb {
    color: var(--muted);
    font-size: 15px;
    margin: -8px 0 16px;
  }
  .bucket-list {
    margin: 12px 0 0;
    padding-left: 20px;
  }
  .bucket-list li {
    margin-bottom: 4px;
  }

  /* Plus showcase section */
  .plus-section {
    margin: 56px 0 24px;
    padding: 40px 28px;
    background: linear-gradient(135deg, rgba(234, 179, 8, 0.08), rgba(194, 65, 12, 0.05));
    border: 1px solid var(--border);
    border-radius: 22px;
    position: relative;
    overflow: hidden;
  }
  .plus-eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--brand-yellow);
    margin-bottom: 8px;
  }
  .plus-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -1.2px;
    font-size: 38px;
    margin: 0 0 12px;
    color: var(--text);
  }
  .plus-sub {
    color: var(--muted);
    font-size: 17px;
    line-height: 1.55;
    max-width: 640px;
    margin: 0 0 32px;
  }
  .plus-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .plus-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .plus-card .plus-icon {
    font-size: 26px;
    margin-bottom: 8px;
  }
  .plus-card h3 {
    font-size: 16px;
    margin: 0 0 6px;
    color: var(--text);
  }
  .plus-card p {
    font-size: 14px;
    color: var(--muted);
    margin: 0;
    line-height: 1.5;
  }
  .plus-pricing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
  }
  .plus-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
  }
  .plus-price-amount {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -1px;
    color: var(--text);
  }
  .plus-price-amount span {
    font-size: 16px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0;
  }
  .plus-price-detail {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .plus-fineprint {
    font-size: 12px;
    color: var(--muted);
    margin: 16px 0 0;
    line-height: 1.55;
  }

  /* Sticky header CTA */
  .header-cta {
    background: linear-gradient(135deg, var(--brand-yellow), var(--brand-orange));
    color: #1c1917;
    padding: 8px 16px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    margin-left: auto;
  }
  .header-cta:hover { transform: translateY(-1px); transition: transform 0.15s; }

  /* Legal pages — Privacy + Terms — get a denser, more scannable layout
     than the marketing pages so users can find sections quickly. */
  .legal-meta {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .legal-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    margin: 24px 0 32px;
  }
  .legal-summary h3 {
    margin-top: 0;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
  }
  .legal-summary p { margin-bottom: 8px; }
  .legal-toc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    margin: 24px 0 36px;
  }
  .legal-toc h3 {
    margin: 0 0 12px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
  }
  .legal-toc ol {
    margin: 0;
    padding-left: 22px;
    columns: 2;
    column-gap: 32px;
  }
  .legal-toc li {
    margin-bottom: 4px;
    break-inside: avoid;
  }
  .legal-toc a { color: var(--text); }
  .legal-toc a:hover { color: var(--burnt); }
  /* Section heading anchors — give numbered legal sections clear vertical
     rhythm so users skimming the page can lock onto the heading. */
  main h2 {
    scroll-margin-top: 96px;       /* sticky header doesn't cover anchor */
  }
  main h2 a.heading-anchor {
    color: var(--muted);
    margin-left: 8px;
    font-weight: 400;
    opacity: 0;
    transition: opacity 0.15s;
    text-decoration: none;
  }
  main h2:hover a.heading-anchor { opacity: 1; }
  /* Per-section side note for definitions and call-outs in the legal pages. */
  .legal-note {
    background: rgba(234, 179, 8, 0.08);
    border-left: 3px solid var(--yellow);
    padding: 12px 16px;
    margin: 14px 0;
    color: var(--text);
    font-size: 14px;
    border-radius: 4px;
  }
  .legal-note strong { color: var(--text); }

  /* Single-column TOC on narrow screens */
  @media (max-width: 700px) {
    .legal-toc ol { columns: 1; }
  }

  /* Mobile */
  @media (max-width: 820px) {
    .pricing-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 700px) {
    .how-row { grid-template-columns: 1fr; gap: 16px; }
    .how-img { max-width: 320px; margin: 0 auto; }
    .header-cta { display: none; }
    .pricing-title { font-size: 26px; }
    .pricing-card { padding: 22px; }
    .pricing-card-price { font-size: 30px; }
  }
  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    .hero h1 { font-size: 38px; }
    .site-header nav { gap: 14px; }
    .site-header nav a { font-size: 13px; }
  }
</style>
</head>

  <div class="inner">

      <img src="/assets/icon.png" alt="" />
      Milely
    </a>

</body>
