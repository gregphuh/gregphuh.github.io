<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.description }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<link rel="canonical" href="{{ page.url | absolute_url }}" />

<link rel="icon" type="image/png" href="/assets/icon.png" />
<link rel="apple-touch-icon" href="/assets/icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #292524;
    --surface: #44403c;
    --border: #57534e;
    --burnt: #c2410c;
    --yellow: #eab308;
    --text: #f5f5f4;
    --muted: #a8a29e;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  a { color: var(--burnt); text-decoration: none; }
  a:hover { text-decoration: underline; }
  h1, h2, h3, h4 {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.2;
  }
  h1 { font-size: 36px; margin-bottom: 16px; }
  h2 { font-size: 24px; margin-top: 32px; margin-bottom: 12px; }
  h3 { font-size: 18px; margin-top: 24px; margin-bottom: 8px; }
  p, ul, ol { margin-bottom: 14px; }
  ul, ol { padding-left: 24px; }
  li { margin-bottom: 4px; }
  code { background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  pre { background: var(--surface); padding: 12px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  pre code { background: transparent; padding: 0; }

  /* Header */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 18px 0;
    position: sticky;
    top: 0;
    background: rgba(41, 37, 36, 0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .site-header .inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .site-header .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.025em;
    background: linear-gradient(135deg, var(--yellow), var(--burnt));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-decoration: none;
  }
  .site-header .logo img {
    width: 32px; height: 32px;
    border-radius: 7px;
  }
  .site-header nav {
    margin-left: auto;
    display: flex; gap: 22px;
  }
  .site-header nav a {
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
  }
  .site-header nav a:hover { color: var(--text); }

  /* Main */
  main {
    max-width: 760px;
    margin: 48px auto;
    padding: 0 24px 80px;
  }
  main.wide {
    max-width: 960px;
  }

  /* Footer */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }
  .site-footer a { color: var(--muted); }
  .site-footer .links {
    margin-top: 8px;
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 64px 24px 48px;
    max-width: 760px;
    margin: 0 auto;
  }
  .hero .icon {
    width: 110px; height: 110px;
    border-radius: 24px;
    margin: 0 auto 24px;
    box-shadow: 0 16px 50px rgba(194, 65, 12, 0.4);
  }
  .hero h1 {
    font-size: 48px;
    background: linear-gradient(135deg, var(--yellow), var(--burnt));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
  }
  .hero .tagline {
    font-size: 19px;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .badge-link {
    display: inline-block;
    background: var(--surface);
    padding: 14px 22px;
    border-radius: 12px;
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    border: 1px solid var(--border);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .badge-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(194, 65, 12, 0.2);
    text-decoration: none;
  }

  /* Feature cards */
  .features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
    margin: 48px 0;
  }
  .feature {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
  }
  .feature h3 { margin-top: 0; }

  /* Tables (in markdown content) */
  table { border-collapse: collapse; margin: 16px 0; width: 100%; }
  th, td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
  th { background: var(--surface); }

  /* Page intro for nav pages */
  .page-intro {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  /* Mobile */
  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    .hero h1 { font-size: 38px; }
    .site-header nav { gap: 14px; }
    .site-header nav a { font-size: 13px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="/" class="logo">
      <img src="/assets/icon.png" alt="" />
      Milely
    </a>
    <nav>
      <a href="/help/">Help</a>
      <a href="/support/">Support</a>
      <a href="/privacy/">Privacy</a>
      <a href="/terms/">Terms</a>
    </nav>
  </div>
</header>

{{ content }}

<footer class="site-footer">
  <div>© {{ site.time | date: '%Y' }} SmileyCreative LLC. All rights reserved.</div>
  <div class="links">
    <a href="/privacy/">Privacy Policy</a>
    <a href="/terms/">Terms of Service</a>
    <a href="/support/">Support</a>
    <a href="/help/">Help</a>
  </div>
</footer>

</body>
</html>
