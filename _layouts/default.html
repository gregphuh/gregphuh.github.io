<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.description }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<link rel="canonical" href="{{ page.url | absolute_url }}" />

<link rel="icon" type="image/png" href="/assets/icon.png" />
<link rel="apple-touch-icon" href="/assets/icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Milely" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<meta name="twitter:image" content="{{ '/assets/og-image.png' | absolute_url }}" />

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Milely",
  "description": "{{ site.description }}",
  "applicationCategory": "FinanceApplication",
  "operatingSystem": "iOS 17+",
  "url": "{{ site.url }}",
  "image": "{{ '/assets/og-image.png' | absolute_url }}",
  "publisher": {
    "@type": "Organization",
    "name": "SmileyCreative LLC",
    "url": "{{ site.url }}"
  },
  "offers": [
    {
      "@type": "Offer",
      "name": "Milely Monthly",
      "price": "2.99",
      "priceCurrency": "USD",
      "category": "Subscription"
    },
    {
      "@type": "Offer",
      "name": "Milely Annual",
      "price": "19.99",
      "priceCurrency": "USD",
      "category": "Subscription"
    },
    {
      "@type": "Offer",
      "name": "Milely Lifetime",
      "price": "49.99",
      "priceCurrency": "USD",
      "category": "OneTimePurchase"
    }
  ]
}
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #292524;
    --surface: #44403c;
    --border: #57534e;
    --burnt: #c2410c;
    --yellow: #eab308;
    --text: #f5f5f4;
    --muted: #a8a29e;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  a { color: var(--burnt); text-decoration: none; }
  a:hover { text-decoration: underline; }
  h1, h2, h3, h4 {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.2;
  }
  h1 { font-size: 36px; margin-bottom: 16px; }
  h2 { font-size: 24px; margin-top: 32px; margin-bottom: 12px; }
  h3 { font-size: 18px; margin-top: 24px; margin-bottom: 8px; }
  p, ul, ol { margin-bottom: 14px; }
  ul, ol { padding-left: 24px; }
  li { margin-bottom: 4px; }
  code { background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  pre { background: var(--surface); padding: 12px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  pre code { background: transparent; padding: 0; }

  /* Header */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 18px 0;
    position: sticky;
    top: 0;
    background: rgba(41, 37, 36, 0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .site-header .inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .site-header .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.025em;
    background: linear-gradient(135deg, var(--yellow), var(--burnt));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-decoration: none;
  }
  .site-header .logo img {
    width: 32px; height: 32px;
    border-radius: 7px;
  }
  .site-header nav {
    margin-left: auto;
    display: flex; gap: 22px;
  }
  .site-header nav a {
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
  }
  .site-header nav a:hover { color: var(--text); }

  /* Main */
  main {
    max-width: 760px;
    margin: 48px auto;
    padding: 0 24px 80px;
  }
  main.wide {
    max-width: 960px;
  }

  /* Footer */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }
  .site-footer a { color: var(--muted); }
  .site-footer .links {
    margin-top: 8px;
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 64px 24px 48px;
    max-width: 760px;
    margin: 0 auto;
  }
  .hero .icon {
    width: 110px; height: 110px;
    border-radius: 24px;
    margin: 0 auto 24px;
    box-shadow: 0 16px 50px rgba(194, 65, 12, 0.4);
  }
  .hero h1 {
    font-size: 48px;
    background: linear-gradient(135deg, var(--yellow), var(--burnt));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
  }
  .hero .tagline {
    font-size: 19px;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .badge-link {
    display: inline-block;
    background: var(--surface);
    padding: 14px 22px;
    border-radius: 12px;
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    border: 1px solid var(--border);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .badge-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(194, 65, 12, 0.2);
    text-decoration: none;
  }

  /* Feature cards */
  .features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
    margin: 48px 0;
  }
  .feature {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
  }
  .feature h3 { margin-top: 0; }

  /* Tables (in markdown content) */
  table { border-collapse: collapse; margin: 16px 0; width: 100%; }
  th, td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
  th { background: var(--surface); }

  /* Page intro for nav pages */
  .page-intro {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  /* Two-column "how-to" rows: copy on the left, phone screenshot on the right. */
  .how-row {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 36px;
    align-items: start;
    margin: 24px 0 8px;
  }
  .how-text :first-child { margin-top: 0; }
  .how-text ol, .how-text ul { padding-left: 20px; }
  .how-text li { margin-bottom: 6px; }
  .how-img {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px;
  }
  .how-img img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 14px;
  }

  /* Accordion FAQ */
  details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 8px 0;
  }
  details summary {
    cursor: pointer;
    list-style: none;
    color: var(--text);
    padding-right: 24px;
    position: relative;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::after {
    content: "＋";
    position: absolute;
    right: 0;
    top: 0;
    color: var(--muted);
    font-weight: 400;
  }
  details[open] summary::after { content: "－"; }
  details > p, details > ul, details > ol {
    margin-top: 10px;
    color: var(--muted);
  }

  /* Pricing comparison — two big cards side-by-side */
  .pricing { margin: 48px 0 32px; }
  .pricing-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -1px;
    font-size: 32px;
    margin: 0 0 8px;
    color: var(--text);
  }
  .pricing-sub {
    color: var(--muted);
    font-size: 16px;
    line-height: 1.55;
    margin: 0 0 28px;
    max-width: 720px;
  }
  .pricing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .pricing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    display: flex;
    flex-direction: column;
  }
  .pricing-card-base {
    border-color: var(--border);
  }
  .pricing-card-plus {
    border-color: var(--brand-yellow);
    background: linear-gradient(180deg, rgba(234, 179, 8, 0.06), rgba(234, 179, 8, 0.02) 60%, var(--surface));
  }
  .pricing-card-tag {
    display: inline-block;
    align-self: flex-start;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    background: rgba(120, 113, 108, 0.18);
    color: var(--muted);
    margin-bottom: 12px;
  }
  .pricing-card-tag-optional {
    background: rgba(234, 179, 8, 0.18);
    color: var(--brand-yellow);
  }
  .pricing-card-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -1px;
    font-size: 28px;
    margin: 0 0 4px;
    color: var(--text);
  }
  .plus-sigil {
    color: var(--brand-yellow);
  }
  .pricing-card-price {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 36px;
    letter-spacing: -1.2px;
    color: var(--text);
    margin: 4px 0 8px;
  }
  .pricing-card-price span {
    font-size: 15px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0;
  }
  .pricing-card-tagline {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
    margin: 0 0 18px;
  }
  .pricing-card-section {
    margin-top: 20px;
  }
  .pricing-card-section h4 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 10px;
  }
  .pricing-card-section-muted h4 {
    color: rgba(168, 162, 158, 0.7);
  }
  .pricing-card-fineprint {
    margin-top: auto;
    padding-top: 18px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
  }

  /* Checklists inside pricing cards */
  .checklist {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .checklist li {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 6px 0;
    font-size: 14.5px;
    color: var(--text);
    line-height: 1.5;
  }
  .checklist .check {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(34, 197, 94, 0.18);
    color: rgb(34, 197, 94);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    margin-top: 1px;
  }
  .checklist .check-plus {
    background: linear-gradient(135deg, var(--brand-yellow), var(--brand-orange));
    color: #1c1917;
    font-size: 14px;
  }
  .checklist .check-x {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(120, 113, 108, 0.2);
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    margin-top: 1px;
  }
  .checklist-muted li {
    color: var(--muted);
    font-size: 14px;
  }

  .badge-link-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: none;
  }

  /* Side-by-side comparison table */
  .compare-wrap {
    overflow-x: auto;
    margin: 16px 0 32px;
  }
  .compare {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .compare th, .compare td {
    border: 1px solid var(--border);
    padding: 12px 14px;
    text-align: left;
    vertical-align: top;
  }
  .compare th {
    background: var(--surface);
    font-size: 13px;
    letter-spacing: 0.4px;
  }
  .compare th.th-base { color: var(--text); }
  .compare th.th-plus { color: var(--brand-yellow); }
  .compare th .th-price {
    display: block;
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .compare td.cell-no { color: var(--muted); }

  /* Themes showcase — labeled grid making Plus value obvious */
  .themes-showcase {
    margin: 48px 0;
  }
  .themes-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -1px;
    font-size: 28px;
    margin: 0 0 8px;
    color: var(--text);
  }
  .themes-sub {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
    margin: 0 0 24px;
    max-width: 720px;
  }
  .themes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
  }
  .theme-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 12px 12px 0;
    margin: 0;
    overflow: hidden;
    transition: transform 0.15s ease;
    display: flex;
    flex-direction: column;
  }
  .theme-card:hover { transform: translateY(-2px); }
  .theme-card-base {
    border-color: var(--brand-orange);
    box-shadow: 0 0 0 1px rgba(194, 65, 12, 0.18);
  }
  .theme-card img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .theme-card figcaption {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 4px 4px 12px;
  }
  .theme-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
  }
  .theme-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 999px;
  }
  .theme-badge-base {
    background: rgba(194, 65, 12, 0.18);
    color: var(--brand-orange);
  }
  .theme-badge-plus {
    background: linear-gradient(135deg, var(--brand-yellow), var(--brand-orange));
    color: #1c1917;
  }

  /* Bucket separators (Included vs Plus) */
  .bucket-tag {
    display: inline-block;
    margin-left: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.4px;
    vertical-align: middle;
  }
  .bucket-tag-base {
    background: rgba(120, 113, 108, 0.18);
    color: var(--muted);
  }
  .bucket-blurb {
    color: var(--muted);
    font-size: 15px;
    margin: -8px 0 16px;
  }
  .bucket-list {
    margin: 12px 0 0;
    padding-left: 20px;
  }
  .bucket-list li {
    margin-bottom: 4px;
  }

  /* Plus showcase section */
  .plus-section {
    margin: 56px 0 24px;
    padding: 40px 28px;
    background: linear-gradient(135deg, rgba(234, 179, 8, 0.08), rgba(194, 65, 12, 0.05));
    border: 1px solid var(--border);
    border-radius: 22px;
    position: relative;
    overflow: hidden;
  }
  .plus-eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--brand-yellow);
    margin-bottom: 8px;
  }
  .plus-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -1.2px;
    font-size: 38px;
    margin: 0 0 12px;
    color: var(--text);
  }
  .plus-sub {
    color: var(--muted);
    font-size: 17px;
    line-height: 1.55;
    max-width: 640px;
    margin: 0 0 32px;
  }
  .plus-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .plus-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .plus-card .plus-icon {
    font-size: 26px;
    margin-bottom: 8px;
  }
  .plus-card h3 {
    font-size: 16px;
    margin: 0 0 6px;
    color: var(--text);
  }
  .plus-card p {
    font-size: 14px;
    color: var(--muted);
    margin: 0;
    line-height: 1.5;
  }
  .plus-pricing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
  }
  .plus-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
  }
  .plus-price-amount {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -1px;
    color: var(--text);
  }
  .plus-price-amount span {
    font-size: 16px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0;
  }
  .plus-price-detail {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .plus-fineprint {
    font-size: 12px;
    color: var(--muted);
    margin: 16px 0 0;
    line-height: 1.55;
  }

  /* Sticky header CTA */
  .header-cta {
    background: linear-gradient(135deg, var(--brand-yellow), var(--brand-orange));
    color: #1c1917;
    padding: 8px 16px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    margin-left: auto;
  }
  .header-cta:hover { transform: translateY(-1px); transition: transform 0.15s; }

  /* Mobile */
  @media (max-width: 820px) {
    .pricing-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 700px) {
    .how-row { grid-template-columns: 1fr; gap: 16px; }
    .how-img { max-width: 320px; margin: 0 auto; }
    .header-cta { display: none; }
    .pricing-title { font-size: 26px; }
    .pricing-card { padding: 22px; }
    .pricing-card-price { font-size: 30px; }
  }
  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    .hero h1 { font-size: 38px; }
    .site-header nav { gap: 14px; }
    .site-header nav a { font-size: 13px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="/" class="logo">
      <img src="/assets/icon.png" alt="" />
      Milely
    </a>
    <nav>
      <a href="/help/">Help</a>
      <a href="/support/">Support</a>
      <a href="/privacy/">Privacy</a>
      <a href="/terms/">Terms</a>
    </nav>
    <a class="header-cta" href="https://apps.apple.com/app/milely/idTBD" rel="noopener">Get on App Store · $4.99</a>
  </div>
</header>

{{ content }}

<footer class="site-footer">
  <div>© {{ site.time | date: '%Y' }} SmileyCreative LLC. All rights reserved.</div>
  <div class="links">
    <a href="/privacy/">Privacy Policy</a>
    <a href="/terms/">Terms of Service</a>
    <a href="/support/">Support</a>
    <a href="/help/">Help</a>
  </div>
</footer>

</body>
</html>
