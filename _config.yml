# Jekyll config for milely.io — hosted free on GitHub Pages.
title: Milely
# Tagline: under 160 chars, written for SERP snippets — leads with the
# core value prop (mileage tracking) + the differentiator (private,
# on-device, no servers). Used as the homepage <meta name="description">
# fallback and as the OG description fallback.
description: >-
  Privacy-first mileage tracking app for iPhone. Auto-detect drives,
  classify on-device, export audit-ready PDFs for business deductions.
  No servers, no analytics — your trips never leave your phone.
url: "https://milely.io"
baseurl: ""

# Author / publisher metadata — picked up by jekyll-seo-tag for richer
# meta tags + JSON-LD Person/Organization schema.
author:
  name: SmileyCreative LLC
  email: milely@smileycreative.io

# GitHub Pages-supported plugins.
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Defaults for pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/og-image.png

# Don't process these
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Permalink format — clean trailing-slash URLs (no .html suffixes).
permalink: /:path/

# Brand colors (used in CSS via Sass variables — optional)
sass:
  style: compressed

# SEO / social
twitter:
  card: summary_large_image
social:
  name: Milely
  links:
    - https://apps.apple.com/app/milely/id__APPSTORE_ID_PENDING__
