# IRS standard mileage rate for business use of a personal vehicle.
# Update annually when the IRS publishes a new rate (typically
# mid-December via a Notice — e.g., Notice 2024-83 set the 2025
# rate). One source of truth — every "X¢ / 2026" mention on the
# site reads from this file via Liquid: {{ site.data.irs.year }}
# and {{ site.data.irs.cents_per_mile }}.
#
# Half-cent rates (e.g., 65.5¢ in 2023, 62.5¢ for 2022 H2) are
# fine here — Liquid renders the float as-is, so "72.5" comes out
# as "72.5¢" on the rendered page.
#
# Last verified: 2026-04-29 from Greg (confirmed 72.5¢/mile for 2026).
year: 2026
cents_per_mile: 72.5
dollars_per_mile: "0.725"
announced_in_notice: "TBD"   # update when the official Notice number is known
source_url: "https://www.irs.gov/tax-professionals/standard-mileage-rates"
